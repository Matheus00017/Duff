<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duff - Distribuidora de Bebidas</title>
</head>
<body>
    <header>
        <div class="logo"><img src="img/logo.png" alt="logo"></div>    
        
        <select name="opcoes" id="opcoes" onchange="abrirAlert()">
            <option value="">Selecione uma opção</option>
            <option value="fornecedores">Cadastro de fornecedores</option>
            <option value="empresas">cadastro de empresas</option>
        </select>

        <button onclick="alert('Você clicou em Estoque')">Estoque</button>
        <button onclick="alert('Você clicou em Vendas')">Vendas</button>
    </header>

    <nav class="categorias">
        <div class="categoria">
            <span class="icone-emoji">🍹</span>
            <p>Todas as Bebidas</p>            
        </div>

        <div class="categoria">
        <img src="img/Cerveja/Engradados/Amstel.png" alt="Cervejas">
        <p>Cervejas</p>
    </div>

    <div class="categoria">
        <img src="img/Espumantes/Moët & Chandon.png" alt="Espumantes">
        <p>Espumantes</p>
    </div>

    <div class="categoria">
        <img src="img/Gim/Bombay Sapphire.png" alt="Gim">
        <p>Gim</p>
    </div>

    <div class="categoria">
        <img src="img/Refrigerante/Latas_Feito/Coca-Cola.png" alt="Refrigerantes">
        <p>Refrigerantes</p>
    </div>

    <div class="categoria">
        <img src="img/Rum/Bacardi.png" alt="Rum">
        <p>Rum</p>
    </div>

    <div class="categoria">
        <img src="img/vinhos/tintos/Miolo.png" alt="Vinhos">
        <p>Vinhos</p>
    </div>

    <div class="categoria">
        <img src="img/vinhos/Rose/Mateus Rosé.png" alt="Vinho Rose">
        <p>Vinho Rose</p>
    </div>

    <div class="categoria">
        <img src="img/vinhos/Brancos/Miolo.png" alt="Vinho Branco">
        <p>Vinho Branco</p>
    </div>

    <div class="categoria">
        <img src="img/vodkas/Absolut.png" alt="Vodka">
        <p>Vodka</p>
    </div>

    <div class="categoria">
        <img src="img/wiski/Johnnie Walker.png" alt="Whisky">
        <p>Whisky</p>
    </div>
    </nav>

    <script src="JS/script.js"></script>
</body>
</html>
