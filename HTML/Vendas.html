<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUFF - Dashboard de Vendas</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <div class="logo">
      <a href="../index.html">
        <img src="../img/logo.png" alt="DUFF" onerror="this.style.display='none'">
      </a>
      <span class="logo-text">DUFF</span>
    </div>
    <nav>
      <a href="Pedido.html" class="nav-btn">Pedido</a>
      <a href="Estoque.html" class="nav-btn">Estoque</a>
      <div class="dropdown">
        <button class="nav-btn" id="btnCadastro" onclick="toggleDropdown()">Cadastro ▾</button>
        <div class="dropdown-menu" id="dropdownMenu">
          <button class="dropdown-item" onclick="openCadastro('colaborador')">Cadastrar Funcionarios</button>
          <button class="dropdown-item" onclick="openCadastro('empresa')">Cadastrar Empresa</button>
        </div>
      </div>
    </nav>
  </header>

  <main class="dashboard">

    <h1 class="dash-title">Dashboard de Vendas</h1>

    <!-- CARDS DE RESUMO -->
    <div class="dash-cards">
      <div class="dash-card">
        <div class="dash-card-icon">💰</div>
        <div class="dash-card-info">
          <span class="dash-card-label">Total de Vendas (mês)</span>
          <span class="dash-card-value" id="totalVendas">Carregando...</span>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-icon">📦</div>
        <div class="dash-card-info">
          <span class="dash-card-label">Pedidos (mês)</span>
          <span class="dash-card-value" id="totalPedidos">Carregando...</span>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-icon">📅</div>
        <div class="dash-card-info">
          <span class="dash-card-label">Vendas Hoje</span>
          <span class="dash-card-value" id="vendasHoje">Carregando...</span>
        </div>
      </div>
    </div>

    <!-- GRÁFICO -->
    <div class="dash-chart-box">
      <h2>Vendas dos últimos 7 dias</h2>
      <canvas id="graficoVendas"></canvas>
    </div>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">CADASTRO</h3>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div id="modalForm"></div>
        <div class="form-msg" id="formMsg"></div>
      </div>
    </div>
  </div>

  <script src="../JS/script.js"></script>
</body>
</html>
