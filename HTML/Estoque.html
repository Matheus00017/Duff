<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUFF - Estoque</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

  <header>
    <div class="logo">
      <a href="../index.html">
        <img src="../img/logo.png" alt="DUFF" onerror="this.style.display='none'">
      </a>
      <span class="logo-text">DUFF</span>
    </div>
    <nav>
      <a href="Pedido.html" class="nav-btn">Pedido</a>
      <a href="Vendas.html" class="nav-btn">Vendas</a>
      <div class="dropdown">
        <button class="nav-btn" id="btnCadastro" onclick="toggleDropdown()">Cadastro ▾</button>
        <div class="dropdown-menu" id="dropdownMenu">
          <button class="dropdown-item" onclick="openCadastro('colaborador')">Cadastrar Funcionarios</button>
          <button class="dropdown-item" onclick="openCadastro('empresa')">Cadastrar Empresa</button>
        </div>
      </div>
    </nav>
  </header>

  <main class="estoque">

    <div class="estoque-header">
      <h1 class="estoque-title">Controle de Estoque</h1>
      <button class="btn-novo-produto" onclick="openProdutoModal()">+ Novo Produto</button>
    </div>

    <!-- RESUMO -->
    <div class="estoque-resumo">
      <div class="resumo-card resumo-baixo">
        <span class="resumo-icon">⚠️</span>
        <div>
          <span class="resumo-label">Estoque Baixo</span>
          <span class="resumo-valor" id="qtdBaixo">0</span>
        </div>
      </div>
      <div class="resumo-card resumo-normal">
        <span class="resumo-icon">📦</span>
        <div>
          <span class="resumo-label">Estoque Normal</span>
          <span class="resumo-valor" id="qtdNormal">0</span>
        </div>
      </div>
      <div class="resumo-card resumo-alto">
        <span class="resumo-icon">📈</span>
        <div>
          <span class="resumo-label">Acima da Média</span>
          <span class="resumo-valor" id="qtdAlto">0</span>
        </div>
      </div>
    </div>

    <!-- GRID DE PRODUTOS -->
    <div class="estoque-grid" id="estoqueGrid">
      <div class="loading-msg">Carregando estoque...</div>
    </div>

  </main>

  <!-- MODAL CADASTRO FUNCIONARIO/EMPRESA -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">CADASTRO</h3>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div id="modalForm"></div>
        <div class="form-msg" id="formMsg"></div>
      </div>
    </div>
  </div>

  <!-- MODAL NOVO PRODUTO -->
  <div class="modal-overlay" id="produtoModalOverlay" onclick="closeProdutoModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <h3>NOVO PRODUTO</h3>
        <button class="modal-close" onclick="closeProdutoModal()">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Nome do produto</label>
          <input type="text" id="np_nome" placeholder="Ex: Cerveja Heineken 600ml">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Preço (R$)</label>
            <input type="number" id="np_preco" step="0.01" placeholder="0.00">
          </div>
          <div class="form-group">
            <label>Quantidade inicial</label>
            <input type="number" id="np_quantidade" placeholder="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Unidade</label>
            <input type="text" id="np_unidade" placeholder="Ex: garrafa, lata, fardo">
          </div>
          <div class="form-group">
            <label>Tipo de bebida</label>
            <select id="np_tipo"></select>
          </div>
        </div>
        <div class="form-group">
          <label>Caminho da imagem (opcional)</label>
          <input type="text" id="np_imagem" placeholder="img/produto.png">
        </div>
        <button class="btn-submit" onclick="submitNovoProduto()">Cadastrar Produto</button>
        <div class="form-msg" id="produtoFormMsg"></div>
      </div>
    </div>
  </div>

  <script src="../JS/script.js"></script>
  <script src="../JS/estoque.js"></script>
</body>
</html>
